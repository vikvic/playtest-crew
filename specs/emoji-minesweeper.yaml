# Game spec for games/emoji-minesweeper — a real, actively-used third-party
# game (github.com/muan/emoji-minesweeper, MIT, 905 stars, live at
# muan.co/emoji-minesweeper), integrated via the SDK model exactly as an
# outside developer would: only two additions to the vendored source (the
# SDK script tag in index.html, one PTC.exposeState() call at the end of
# game.js). No RNG call site touched.
#
# Bigger and more real than games/minesweeper on purpose: a 10x10/100-cell
# default board (vs. 25 cells), per-cell state living as DOM element
# properties rather than a central array, a first-click-is-always-safe
# mechanic that silently reshuffles the whole board if your first click
# would have hit a bomb, a bundled analytics script, and a service worker
# registration — all real complexity this project's own code never had to
# deal with.

game: "emoji-minesweeper"
entry: index.html
viewport: { w: 500, h: 700 }

seed_strategy: global-random-patch
state_source: adapter
adapter_version: emoji-minesweeper@1

state_notes: >
  { cells: Array<{isMasked, isBomb, isFlagged, mineCount}> (one entry per
  .cell DOM element, in row-major DOM order -- NOT a 2D array, this game
  keeps state as custom properties on individual DOM elements rather than
  a central grid), result: "won" | "lost" | null, moves: number,
  cols/rows/bombs: number (board dimensions).
  DELIBERATE DESIGN CHOICE, not a bug: isBomb/mineCount are exposed for
  EVERY cell, including still-masked ones -- this is the true internal
  state used for hashing/replay/oracle verification, not the
  player-visible view (a real player never sees an unrevealed cell's
  contents). The explorer therefore plays with full ground-truth vision,
  which is fine for oracle-driven bug hunting (more thorough exploration)
  but means llm.jsonl reasoning should not be read as "how a human would
  reason blind." A fairness-preserving variant would null out isBomb/
  mineCount for masked cells; not done here so the invariants below can
  check bomb-count conservation directly against every cell regardless of
  reveal state.
  KNOWN QUIRK (upstream, not introduced by this integration): the FIRST
  reveal click is always guaranteed safe -- if it would have hit a bomb,
  the game silently regenerates an entirely new board (consuming more of
  the seeded Math.random stream) and re-clicks the same screen position.
  Still fully deterministic under a fixed seed, just non-obvious from the
  action alone.
  EXPECTED NOISE, not a game bug: the vendored page unconditionally tries
  to register a service worker at a hardcoded absolute path
  (/emoji-minesweeper/sw.js) and load Google Analytics from an external
  CDN. Neither exists relative to the harness's local server / a
  network-restricted run, so a console-error candidate mentioning either
  is expected noise, not a finding -- the verify pipeline is exactly what
  should demote it (nondeterministic depending on network reachability,
  unrelated to any click sequence).

# Only LEFT-click reveal actions -- same limitation as games/minesweeper:
