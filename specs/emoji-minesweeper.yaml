budgets:
  max_actions: 200
  screenshot_every: 0
  max_verifications: 5

oracles:
  console_errors: true
  hang:
    unchanged_actions: 5
  invariants:
    - name: bomb-count-conserved
      expr: state.cells.filter(c => c.isBomb).length === state.bombs
    - name: unmasked-in-bounds
      expr: state.cells.filter(c => !c.isMasked).length <= state.cells.length
    - name: moves-non-negative
      expr: state.moves >= 0

# Unlike games/minesweeper, this game's own `result` field cleanly captures
# BOTH win and loss -- no missing-loss-signal gap this time.
terminal_states:
  - state.result === "won"
  - state.result === "lost"
