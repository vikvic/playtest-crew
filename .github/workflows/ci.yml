name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bun test

      - name: Replay smoke — checked-in baseline must still reproduce 3/3
        run: bun src/cli.ts replay --trace baselines/2048/trace.jsonl --times 3
